<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แบบสำรวจความพึงพอใจ — ติดตั้งระบบ ERV</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #1a6fc4; --blue-light: #e8f2fb;
    --green: #1a8a5a; --green-light: #e6f7ef;
    --red: #c0392b; --red-light: #fdecea;
    --amber: #d97706; --amber-light: #fef3c7;
    --gray-200: #e9ecef; --gray-300: #dee2e6;
    --gray-500: #868e96; --gray-700: #495057;
    --text: #1a1a2e; --text-muted: #6c757d;
    --radius: 12px; --radius-sm: 8px;
    --shadow: 0 2px 16px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  }
  body { font-family: 'Sarabun', sans-serif; background: #f8fafc; min-height: 100vh; color: var(--text); }

  /* Navigation */
  .top-nav { background: white; border-bottom: 1px solid var(--gray-200); position: sticky; top: 0; z-index: 100; }
  .nav-inner { max-width: 960px; margin: 0 auto; padding: 0 1rem; display: flex; align-items: center; justify-content: space-between; }
  .nav-logo { font-size: 18px; font-weight: 700; color: var(--blue); padding: 14px 0; }
  .tab-btn { padding: 16px 18px; font-size: 14px; font-family: 'Sarabun'; border: none; background: none; color: var(--text-muted); cursor: pointer; border-bottom: 3px solid transparent; }
  .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }

  /* Layout */
  .panel { display: none; }
  .panel.active { display: block; }
  .content-wrap { max-width: 960px; margin: 0 auto; padding: 2rem 1rem; }

  /* Survey Card */
  .survey-card { background: white; border-radius: var(--radius); box-shadow: var(--shadow-lg); overflow: hidden; max-width: 600px; margin: 0 auto; }
  .survey-header { background: var(--blue); color: white; padding: 2rem; text-align: center; }
  .survey-body { padding: 2rem; }
  .q-block { margin-bottom: 1.5rem; }
  .q-label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 15px; }

  /* Star Elements */
  .star-row { display: flex; gap: 8px; }
  .star { font-size: 32px; cursor: pointer; filter: grayscale(1); opacity: 0.3; transition: 0.2s; }
  .star.on { filter: none; opacity: 1; transform: scale(1.1); }
  .star-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

  /* Selection Chips */
  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { padding: 8px 16px; border: 1px solid var(--gray-300); border-radius: 20px; background: white; cursor: pointer; font-family: 'Sarabun'; font-size: 14px; }
  .chip.sel { border-color: var(--blue); background: var(--blue-light); color: var(--blue); font-weight: 600; }
  .chip.sel-no { border-color: var(--red); background: var(--red-light); color: var(--red); font-weight: 600; }

  .input-field { width: 100%; padding: 10px; border: 1px solid var(--gray-300); border-radius: 8px; font-family: 'Sarabun'; }
  .submit-btn { width: 100%; padding: 14px; background: var(--blue); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-family: 'Sarabun'; margin-top: 1rem; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Dashboard Styles */
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
  .metric { background: white; padding: 1.5rem; border-radius: var(--radius); box-shadow: var(--shadow); }
  .metric .mval { font-size: 32px; font-weight: 700; color: var(--blue); }
  .dash-toolbar { display: flex; gap: 10px; margin-bottom: 1rem; align-items: center; flex-wrap: wrap; }
  .btn-tool { padding: 8px 16px; border-radius: 6px; border: 1px solid; font-weight: 600; cursor: pointer; font-size: 13px; font-family: 'Sarabun'; }
  .btn-csv { border-color: #a8dfc0; background: #e6f7ef; color: var(--green); }
  .btn-json { border-color: #f6cc7a; background: var(--amber-light); color: #92540a; }
  .btn-danger { border-color: #f5c6c2; background: var(--red-light); color: var(--red); }

  .resp-card { background: white; border-radius: 12px; padding: 1rem; margin-bottom: 1rem; border-left: 5px solid #ccc; box-shadow: var(--shadow); position: relative; }
  .resp-card.star5 { border-left-color: var(--green); }
  .resp-card.star1 { border-left-color: var(--red); }

  /* Modal */
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
  .modal.active { display: flex; }
  .modal-box { background: white; padding: 2rem; border-radius: 16px; width: 320px; text-align: center; }
</style>
</head>
<body>

<nav class="top-nav">
  <div class="nav-inner">
    <div class="nav-logo">💨 ERV Survey System</div>
    <div>
      <button class="tab-btn active" id="btn-survey">หน้าประเมิน</button>
      <button class="tab-btn" id="btn-dash">Admin Dashboard</button>
    </div>
  </div>
</nav>

<!-- Survey Panel -->
<div id="tab-survey" class="panel active">
  <div class="content-wrap">
    <div class="survey-card" id="surveyUI">
      <div class="survey-header">
        <h2>ประเมินความพึงพอใจ</h2>
        <p>บริการติดตั้งระบบ ERV</p>
      </div>
      <div class="survey-body">
        <div class="q-block">
          <label class="q-label">ชื่อลูกค้า / โครงการ</label>
          <input type="text" id="custName" class="input-field" placeholder="กรอกชื่อของคุณ">
        </div>
        <div class="q-block">
          <label class="q-label">1. ความพึงพอใจโดยรวม</label>
          <div class="star-row" id="star-row">
            <div class="star" data-v="1">⭐</div>
            <div class="star" data-v="2">⭐</div>
            <div class="star" data-v="3">⭐</div>
            <div class="star" data-v="4">⭐</div>
            <div class="star" data-v="5">⭐</div>
          </div>
          <div class="star-hint" id="starHint">กรุณาเลือกคะแนน</div>
        </div>
        <div class="q-block">
          <label class="q-label">2. ความเป็นมืออาชีพของทีมงาน</label>
          <div class="chip-row" id="q2-row">
            <button class="chip" data-v="มืออาชีพมาก">มืออาชีพมาก</button>
            <button class="chip" data-v="ค่อนข้างดี">ค่อนข้างดี</button>
            <button class="chip" data-v="ปานกลาง">ปานกลาง</button>
            <button class="chip" data-v="ควรปรับปรุง" data-cls="sel-no">ควรปรับปรุง</button>
          </div>
        </div>
        <div class="q-block">
          <label class="q-label">3. ความตรงต่อเวลา</label>
          <div class="chip-row" id="q3-row">
            <button class="chip" data-v="ตรงเวลา">ตรงเวลา</button>
            <button class="chip" data-v="ล่าช้าเล็กน้อย">ล่าช้าเล็กน้อย</button>
            <button class="chip" data-v="ล่าช้ามาก" data-cls="sel-no">ล่าช้ามาก</button>
          </div>
        </div>
        <div class="q-block">
          <label class="q-label">4. ข้อเสนอแนะเพิ่มเติม</label>
          <textarea id="comment" class="input-field" rows="3" placeholder="เขียนความเห็นของคุณที่นี่..."></textarea>
        </div>
        <button id="sendBtn" class="submit-btn">ส่งข้อมูล ✓</button>
      </div>
    </div>
    <div id="thanksUI" style="display:none; text-align:center; padding:4rem 2rem;">
      <h1 style="font-size:64px;">✅</h1>
      <h2>ส่งข้อมูลเรียบร้อยแล้ว!</h2>
      <p style="color:var(--text-muted); margin:1rem 0;">ขอบคุณที่ไว้วางใจใช้บริการของเรา</p>
      <button onclick="location.reload()" class="submit-btn" style="max-width:200px;">กลับหน้าหลัก</button>
    </div>
  </div>
</div>

<!-- Dashboard Panel -->
<div id="tab-dash" class="panel">
  <div class="content-wrap">
    <div class="metrics">
      <div class="metric">
        <div style="font-size:12px; color:var(--text-muted);">จำนวนแบบสอบถาม</div>
        <div class="mval" id="m-count">0</div>
      </div>
      <div class="metric">
        <div style="font-size:12px; color:var(--text-muted);">คะแนนเฉลี่ย</div>
        <div class="mval" id="m-avg">0.0</div>
      </div>
    </div>

    <div class="dash-toolbar">
      <button class="btn-tool btn-csv" id="btnCsv">Export CSV</button>
      <button class="btn-tool btn-json" id="btnJson">Export JSON</button>
      <div style="flex:1"></div>
      <button class="btn-tool btn-danger" id="btnClear">🗑 ล้างข้อมูลทั้งหมด</button>
    </div>

    <div id="dataList">
      <div style="text-align:center; padding:3rem; color:var(--gray-500);">กำลังเชื่อมต่อฐานข้อมูล...</div>
    </div>
  </div>
</div>

<!-- Admin Login Modal -->
<div id="authModal" class="modal">
  <div class="modal-box">
    <h3 style="margin-bottom:1rem;">เข้าสู่ระบบ Admin</h3>
    <input type="password" id="passInput" class="input-field" placeholder="รหัสผ่าน" style="text-align:center; margin-bottom:1rem;">
    <button id="authBtn" class="submit-btn" style="margin-top:0;">ตกลง</button>
    <button id="closeAuth" style="background:none; border:none; margin-top:10px; color:#999; cursor:pointer;">ยกเลิก</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
  import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, getDocs, deleteDoc, doc, writeBatch } 
    from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCrP6AIvPcs8ORHBdYJYfkbZJsGn-1Hkqg",
    authDomain: "erv-survey.firebaseapp.com",
    projectId: "erv-survey",
    storageBucket: "erv-survey.firebasestorage.app",
    messagingSenderId: "367636638742",
    appId: "1:367636638742:web:2a9279b6f528204c099937"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const COLLECTION = "erv_surveys";
  const colRef = collection(db, COLLECTION);

  // Initialize Anonymous Auth (Silent)
  signInAnonymously(auth).catch(e => console.log("Login offline/disabled"));

  let state = { star: 0, q2: '', q3: '' };
  let cachedData = [];

  // Tab Logic
  document.getElementById('btn-survey').onclick = () => switchTab('survey');
  document.getElementById('btn-dash').onclick = () => document.getElementById('authModal').classList.add('active');
  document.getElementById('closeAuth').onclick = () => document.getElementById('authModal').classList.remove('active');

  // Star Logic
  document.querySelectorAll('.star').forEach(el => {
    el.onclick = () => {
      state.star = parseInt(el.dataset.v);
      document.querySelectorAll('.star').forEach((s, i) => s.classList.toggle('on', i < state.star));
      document.getElementById('starHint').textContent = ['','ต้องปรับปรุง','พอใช้','ปานกลาง','ดีมาก','ยอดเยี่ยม!'][state.star];
    };
  });

  // Chip Logic
  function bindChips(rowId, key) {
    document.querySelectorAll(`#${rowId} .chip`).forEach(el => {
      el.onclick = () => {
        state[key] = el.dataset.v;
        document.querySelectorAll(`#${rowId} .chip`).forEach(c => c.classList.remove('sel', 'sel-no'));
        el.classList.add(el.dataset.cls || 'sel');
      };
    });
  }
  bindChips('q2-row', 'q2');
  bindChips('q3-row', 'q3');

  // Send Data
  document.getElementById('sendBtn').onclick = async () => {
    const name = document.getElementById('custName').value.trim();
    if (!name || state.star === 0) return alert('กรุณาระบุชื่อและให้คะแนนครับ');

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.textContent = 'กำลังส่ง...';

    try {
      await addDoc(colRef, {
        customer_name: name,
        star: state.star,
        q2_pro: state.q2 || 'ปานกลาง',
        q3_time: state.q3 || 'ตรงเวลา',
        comment: document.getElementById('comment').value.trim(),
        timestamp: serverTimestamp()
      });
      document.getElementById('surveyUI').style.display = 'none';
      document.getElementById('thanksUI').style.display = 'block';
    } catch (e) {
      alert('Error: ' + e.message);
      btn.disabled = false;
      btn.textContent = 'ส่งข้อมูล ✓';
    }
  };

  // Dashboard & Admin
  document.getElementById('authBtn').onclick = () => {
    if (document.getElementById('passInput').value === "Coral789") {
      document.getElementById('authModal').classList.remove('active');
      switchTab('dash');
      initDash();
    } else alert('รหัสผ่านไม่ถูกต้อง');
  };

  function switchTab(t) {
    document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === `tab-${t}`));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === `btn-${t}`));
  }

  function initDash() {
    const q = query(colRef, orderBy('timestamp', 'desc'));
    onSnapshot(q, (snap) => {
      cachedData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderDash();
    }, (err) => {
      document.getElementById('dataList').innerHTML = `<div style="color:red; text-align:center;">ไม่สามารถเข้าถึงข้อมูลได้: ${err.message}</div>`;
    });
  }

  function renderDash() {
    const total = cachedData.length;
    const avg = total ? (cachedData.reduce((s, r) => s + (r.star || 0), 0) / total).toFixed(1) : '0.0';
    document.getElementById('m-count').textContent = total;
    document.getElementById('m-avg').textContent = avg;

    const list = document.getElementById('dataList');
    if (!total) {
      list.innerHTML = '<div style="text-align:center; padding:3rem; color:#999;">ยังไม่มีข้อมูล</div>';
      return;
    }

    list.innerHTML = cachedData.map(r => {
      const date = r.timestamp ? new Date(r.timestamp.seconds * 1000).toLocaleString('th-TH') : '...';
      return `
        <div class="resp-card star${r.star === 5 ? '5' : r.star === 1 ? '1' : ''}">
          <div style="display:flex; justify-content:space-between; align-items:flex-start;">
            <div>
              <strong>${r.customer_name}</strong>
              <div style="font-size:13px; color:var(--blue); margin-top:4px;">${'⭐'.repeat(r.star)} (${r.star} ดาว)</div>
            </div>
            <div style="font-size:11px; color:#999;">${date}</div>
          </div>
          <div style="font-size:13px; margin-top:10px; display:grid; grid-template-columns: 1fr 1fr; gap: 5px;">
            <div>ทีมงาน: ${r.q2_pro}</div>
            <div>เวลา: ${r.q3_time}</div>
          </div>
          ${r.comment ? `<div style="margin-top:8px; padding-top:8px; border-top:1px dashed #eee; font-size:13px; font-style:italic;">"${r.comment}"</div>` : ''}
        </div>
      `;
    }).join('');
  }

  // FORCE DELETE ALL (ปรับปรุงใหม่)
  document.getElementById('btnClear').onclick = async () => {
    if (!cachedData.length) return alert('ไม่มีข้อมูลให้ลบ');
    if (!confirm('ยืนยันลบข้อมูลทั้งหมด "ถาวร" ใช่หรือไม่?')) return;

    const btn = document.getElementById('btnClear');
    btn.disabled = true;
    btn.textContent = 'กำลังลบ...';

    try {
      // 1. ลองลบแบบทีละรายการเพื่อให้มั่นใจ
      const snap = await getDocs(colRef);
      if (snap.empty) {
        alert('ฐานข้อมูลว่างเปล่าอยู่แล้ว');
        return;
      }

      const promises = snap.docs.map(d => deleteDoc(doc(db, COLLECTION, d.id)));
      await Promise.all(promises);
      
      alert('ลบเรียบร้อยแล้ว!');
    } catch (e) {
      console.error(e);
      alert('ลบไม่สำเร็จ! \n\nสาเหตุที่เป็นไปได้: \n1. Security Rules ยังไม่อนุญาตให้ลบ \n2. อินเทอร์เน็ตมีปัญหา \n\nรายละเอียด Error: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = '🗑 ล้างข้อมูลทั้งหมด';
    }
  };

  // Export Logic
  document.getElementById('btnCsv').onclick = () => {
    if (!cachedData.length) return;
    const csv = "\uFEFFลำดับ,วันที่,ชื่อลูกค้า,คะแนน,ทีมงาน,เวลา,ความเห็น\n" + 
      cachedData.map((r,i) => {
        const d = r.timestamp ? new Date(r.timestamp.seconds*1000).toLocaleDateString() : '';
        return `${i+1},${d},"${r.customer_name}",${r.star},${r.q2_pro},${r.q3_time},"${r.comment || ''}"`
      }).join("\n");
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'erv-survey-data.csv'; a.click();
  };

  document.getElementById('btnJson').onclick = () => {
    if (!cachedData.length) return;
    const blob = new Blob([JSON.stringify(cachedData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'erv-survey-data.json'; a.click();
  };
</script>
</body>
</html>
