<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบสอบถามความพึงพอใจการติดตั้งระบบ ERV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #f0f4f8; }
        .star-rating { display: flex; flex-direction: row-reverse; justify-content: flex-end; }
        .star-rating input { display: none; }
        .star-rating label { font-size: 2.2rem; color: #ddd; cursor: pointer; padding: 0 0.15rem; transition: all 0.2s ease; }
        .star-rating input:checked ~ label { color: #fbbf24; }
        .star-rating label:hover, .star-rating label:hover ~ label { color: #fcd34d; transform: scale(1.1); }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .loading-spinner { border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; width: 1.5rem; height: 1.5rem; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 min-h-screen flex flex-col items-center justify-center">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden fade-in">
        <div class="bg-gradient-to-br from-blue-600 to-blue-800 p-8 text-white text-center">
            <h1 class="text-2xl font-bold">แบบประเมินการติดตั้ง ERV</h1>
            <p class="text-blue-100 text-sm mt-2">ขอบพระคุณที่ไว้วางใจใช้บริการของเรา</p>
        </div>

        <form id="surveyForm" class="p-6 space-y-6">
            <div class="space-y-4">
                <input type="text" name="customer_name" required placeholder="ชื่อลูกค้า / ชื่อโครงการ" class="w-full px-4 py-3 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="text" name="job_id" placeholder="หมายเลข Job ID (ถ้ามี)" class="w-full px-4 py-3 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="space-y-4">
                <label class="text-sm font-medium text-gray-700">1. คุณภาพงานติดตั้ง</label>
                <div class="star-rating"><input type="radio" id="q1-5" name="q1" value="5" required><label for="q1-5" class="fas fa-star"></label><input type="radio" id="q1-4" name="q1" value="4"><label for="q1-4" class="fas fa-star"></label><input type="radio" id="q1-3" name="q1" value="3"><label for="q1-3" class="fas fa-star"></label><input type="radio" id="q1-2" name="q1" value="2"><label for="q1-2" class="fas fa-star"></label><input type="radio" id="q1-1" name="q1" value="1"><label for="q1-1" class="fas fa-star"></label></div>
                
                <label class="text-sm font-medium text-gray-700">2. ความสะอาดหน้างาน</label>
                <div class="star-rating"><input type="radio" id="q2-5" name="q2" value="5" required><label for="q2-5" class="fas fa-star"></label><input type="radio" id="q2-4" name="q2" value="4"><label for="q2-4" class="fas fa-star"></label><input type="radio" id="q2-3" name="q2" value="3"><label for="q2-3" class="fas fa-star"></label><input type="radio" id="q2-2" name="q2" value="2"><label for="q2-2" class="fas fa-star"></label><input type="radio" id="q2-1" name="q2" value="1"><label for="q2-1" class="fas fa-star"></label></div>
            </div>

            <textarea name="feedback" rows="3" placeholder="ข้อเสนอแนะเพิ่มเติม..." class="w-full px-4 py-3 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500"></textarea>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg flex items-center justify-center">ส่งแบบประเมิน</button>
        </form>

        <div id="successMsg" class="hidden p-12 text-center space-y-4">
            <i class="fas fa-check-circle text-green-500 text-6xl"></i>
            <h2 class="text-2xl font-bold">ส่งข้อมูลสำเร็จ!</h2>
            <p class="text-gray-500">ขอบพระคุณสำหรับข้อมูลครับ</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'erv-survey-app';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let user = null;
        onAuthStateChanged(auth, u => user = u);
        const init = async () => { 
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
            else await signInAnonymously(auth);
        };
        init();

        const form = document.getElementById('surveyForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!user) return;
            
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<div class="loading-spinner"></div>';

            const formData = new FormData(form);
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'surveys'), {
                    customer_name: formData.get('customer_name'),
                    job_id: formData.get('job_id'),
                    ratings: { q1: parseInt(formData.get('q1')), q2: parseInt(formData.get('q2')) },
                    feedback: formData.get('feedback'),
                    submitted_at: serverTimestamp()
                });
                form.classList.add('hidden');
                document.getElementById('successMsg').classList.remove('hidden');
            } catch (err) { console.error(err); btn.disabled = false; btn.innerText = "ส่งแบบประเมิน"; }
        });
    </script>
</body>
</html>
